<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convite 15 Anos • Geovanna Anita</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Georgia, serif;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.18), transparent 30%),
        radial-gradient(circle at bottom, rgba(212, 175, 55, 0.08), transparent 25%),
        linear-gradient(180deg, #050505 0%, #0c0b08 40%, #12100c 100%);
      overflow-x: hidden;
    }
    .gold-text { background: linear-gradient(180deg, #f8e8a6 0%, #d9b95b 40%, #b8860b 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .gold-border { border-color: rgba(212, 175, 55, 0.45); }
    .sparkles::before, .sparkles::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255, 222, 120, 0.95) 0 1px, transparent 1.6px), radial-gradient(circle, rgba(255, 222, 120, 0.55) 0 1px, transparent 1.5px);
      background-size: 120px 120px, 180px 180px;
      background-position: 10px 20px, 50px 70px;
      opacity: 0.18;
    }
    .divider-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,.7), transparent); }
    .btn-gold { background: linear-gradient(180deg, #f2db99 0%, #c89a2a 65%, #9f720f 100%); color: #1a1408; box-shadow: 0 10px 24px rgba(212, 175, 55, 0.2); }
    img { max-width: 100%; height: auto; display: block; }
    .gold-text { font-size: clamp(1.6rem, 6vw, 4.5rem); }
    @media (max-width: 640px) { body { padding-bottom: 2rem; } }
    .brand-footer { text-align: center; padding: 16px; font-size: 11px; color: rgba(255,255,255,.22); letter-spacing: 0.05em; }
    .brand-footer a { color: rgba(212,175,55,.45); text-decoration: none; font-weight: 600; }
    .brand-footer a:hover { color: rgba(212,175,55,.85); }
  </style>
</head>
<body class="text-white min-h-screen">
  <section id="cover" class="sparkles relative min-h-screen flex items-center justify-center px-4 py-10 transition-all duration-700">
    <div class="absolute inset-0 bg-black/20"></div>
    <div class="relative z-10 w-full max-w-4xl mx-auto text-center">
      <div class="flex justify-center mb-8">
        <img src="mascara.png" alt="Máscara de Baile Dourada - XV Anos Geovanna Anita" class="w-48 sm:w-60 mx-auto drop-shadow-[0_8px_14px_rgba(0,0,0,0.55)] object-contain" />
      </div>
      <p class="uppercase tracking-[0.4em] text-xs sm:text-sm text-amber-200/80 mb-4">Baile de Máscaras</p>
      <h1 class="gold-text text-4xl sm:text-6xl md:text-7xl italic leading-tight">Geovanna Anita</h1>
      <p class="mt-4 text-amber-100/80 tracking-[0.25em] uppercase text-sm sm:text-base">XV Anos • 10/10/2026</p>
      <div class="mt-10 flex justify-center">
        <img
          id="envelope"
          src="seu-envelope.png"
          alt="Envelope do Convite - toque para revelar"
          class="w-64 sm:w-80 cursor-pointer transition-transform duration-500 hover:-translate-y-2 hover:scale-105 drop-shadow-[0_15px_25px_rgba(0,0,0,0.6)] object-contain"
          role="button" tabindex="0" aria-label="Abrir convite"
        />
      </div>
      <p class="mt-8 text-sm sm:text-base text-amber-100/75">Toque no envelope para revelar o convite</p>
    </div>
  </section>

  <footer class="brand-footer">
    Convite criado por <a href="https://convidaeu.com.br" target="_blank" rel="noopener">Convida&u</a>
  </footer>

  <script>
    const envelope = document.getElementById('envelope');
    envelope.addEventListener('click', () => { window.location.href = 'convite.html'; });
    envelope.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.location.href = 'convite.html'; } });
  </script>
</body>
</html>
